run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gocyclo:
    min-complexity: 15
  errcheck:
    check-type-assertions: true
    check-blank: true
  gosec:
    severity: "low"
    confidence: "low"
  gocritic:
    enabled-tags:
      - performance
      - style
      - experimental
    disabled-checks:
      - wrapperFunc

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - typecheck
    - gocyclo
    - gosec
    - gocritic
    - gosimple
    - unused

issues:
  exclude-rules:
    # Exclude some checks in tests
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - gosec
